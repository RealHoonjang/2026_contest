<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진로연계 탐색</title>
  <script>
    (function () {
      var base = location.pathname.replace(/\/?index\.html$/, "").replace(/\/?$/, "/");
      location.replace(base + "public/index.html" + location.hash);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=public/index.html" />
  </noscript>
</head>
<body>
  <p><a href="public/index.html">진로연계 탐색으로 이동</a></p>
</body>
</html>
